<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>Admin Panel</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <style>

    body{
      background:#f1f5f9;
      font-family:Arial;
    }

    .topbar{
      background:#0f172a;
      color:white;
      padding:15px;
    }

    .card-box{
      background:white;
      padding:20px;
      border-radius:10px;
      margin-top:20px;
    }

  </style>

</head>

<body>

<div class="topbar">

  <h3>
    AK Tours Admin
  </h3>

</div>

<div class="container">

  <div class="card-box">

    <h4>
      Registered Users
    </h4>

    <table class="table table-bordered">

      <thead class="table-dark">

        <tr>

          <th>Email</th>

          <th>Created Time</th>

        </tr>

      </thead>

      <tbody id="usersTable"></tbody>

    </table>

  </div>

  <div class="card-box">

    <h4>
      Bookings
    </h4>

    <table class="table table-bordered">

      <thead class="table-dark">

        <tr>

          <th>Name</th>

          <th>Phone</th>

          <th>Place</th>

          <th>Vehicle</th>

          <th>Total</th>

        </tr>

      </thead>

      <tbody id="bookingTable"></tbody>

    </table>

  </div>

</div>

<script type="module"
src="./secure_admin_panel.js"></script>

</body>

</html>
