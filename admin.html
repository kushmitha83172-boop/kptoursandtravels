<script type="module">

import { db } from "./firebase.js";

import {
collection,
query,
orderBy,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// ================= LOAD BOOKINGS =================
async function loadBookings(){

try{

const q = query(
collection(db,"bookings"),
orderBy("createdAt","desc")
);

const snapshot = await getDocs(q);

let output = "";
let sno = 1;

snapshot.forEach((docItem)=>{

const data = docItem.data();

output += `
<tr>
<td>${sno}</td>
<td>${data.name || ""}</td>
<td>${data.phone || ""}</td>
<td>${data.category || ""}</td>
<td>${data.place || ""}</td>
<td>${Array.isArray(data.attractions) ? data.attractions.join(", ") : data.attractions}</td>
<td>${data.vehicle || ""}</td>
<td>${data.payment || ""}</td>

<td>

${
data.payment === "Cash"
? "<span class='text-success fw-bold'>Cash Payment</span>"
:
(
data.paymentProofUrl
?

`
<a
href="${data.paymentProofUrl}"
target="_blank"
class="btn btn-primary btn-sm mb-1">
View SS
</a>

<br>

<img
src="${data.paymentProofUrl}"
width="100"
style="cursor:pointer;border-radius:8px"
onclick="window.open('${data.paymentProofUrl}','_blank')">

`

:

"<span class='text-danger'>No Screenshot Uploaded</span>"
)

}

</td><td>${data.date || ""}</td>
<td>₹${data.total || 0}</td>
<td>
<button class="btn btn-danger btn-sm"
onclick="deleteBooking('${docItem.id}')">
Delete
</button>
</td>
</tr>
`;

sno++;

});

document.getElementById("bookingTable").innerHTML = output;

}
catch(error){
console.log(error);
alert("Failed to load bookings");
}

}

async function loadLogins(){

try{

const q = query(
collection(db,"users"),
orderBy("loginTime","desc")
);

const snapshot = await getDocs(q);

let output = "";
let sno = 1;

snapshot.forEach((docItem)=>{

const data = docItem.data();

output += `
<tr>
<td>${sno}</td>
<td>${data.username || ""}</td>
<td>${data.phone || ""}</td>
<td>
${
data.loginTime?.toDate
? data.loginTime.toDate().toLocaleString()
: ""
}
</td>

<td>
<button
class="btn btn-danger btn-sm"
onclick="deleteUser('${docItem.id}')">
Delete
</button>
</td>

</tr>
`;

sno++;

});

document.getElementById("loginTable").innerHTML = output;

}
catch(error){
console.log(error);
alert("Failed to load login data");
}

}
