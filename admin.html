import {
collection,
query,
orderBy,
getDocs,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
window.approveBooking = async function(id, phone, name){

const message =
`🎉 Hello ${name}, your travel booking is APPROVED by KP Tours & Travels.

Thank you for choosing us!`;

openWhatsApp(phone, message);

await updateDoc(doc(db,"bookings",id), {
status: "approved"
});

loadBookings();
}

window.rejectBooking = async function(id, phone, name){

const message =
`❌ Hello ${name}, sorry your travel booking is REJECTED.

Please contact us for more details.`;

openWhatsApp(phone, message);

await updateDoc(doc(db,"bookings",id), {
status: "rejected"
});

loadBookings();
}
function openWhatsApp(phone, message){

// convert Indian number properly
let formattedPhone = phone.replace(/\D/g,'');
if(formattedPhone.length === 10){
formattedPhone = "91" + formattedPhone;
}

const url = `https://wa.me/${formattedPhone}?text=${encodeURIComponent(message)}`;

window.open(url, "_blank");
}

async function loadBookings(){

orderBy("createdAt","desc")
);

const snapshot = await getDocs(q);

let output = "";
let sno = 1;

snapshot.forEach((docItem)=>{

const data = docItem.data();

// output += `

// <td>${sno}</td>
// <td>${data.name || ""}</td>
// <td>${data.phone || ""}</td>

// <td>${Array.isArray(data.attractions) ? data.attractions.join(", ") : data.attractions}</td>

// <td>${data.payment || ""}</td>


// <td>${data.date || ""}</td>
// <td>₹${data.total || 0}</td>
// <td>
// <button class="btn btn-danger btn-sm"
// onclick="deleteBooking('${docItem.id}')">
// Delete
// </button>
// </td>
// </tr>
// `;
output += `
<tr>
<td>${sno}</td>
<td>${data.name || ""}</td>
<td>${data.phone || ""}</td>
<td>${data.category || ""}</td>
<td>${data.place || ""}</td>
<td>${Array.isArray(data.attractions) ? data.attractions.join(", ") : data.attractions}</td>
<td>${data.vehicle || ""}</td>
<td>${data.payment || ""}</td>
<td>${data.date || ""}</td>
<td>₹${data.total || 0}</td>

<td>

<button class="btn btn-success btn-sm mb-1"
onclick="approveBooking('${docItem.id}','${data.phone}','${data.name}')">
Approve
</button>

<br>

<button class="btn btn-danger btn-sm mb-1"
onclick="rejectBooking('${docItem.id}','${data.phone}','${data.name}')">
Reject
</button>

<br>

<button class="btn btn-dark btn-sm"
onclick="deleteBooking('${docItem.id}')">
Delete
</button>

</td>

</tr>
`;

sno++;

});

document.getElementById("bookingTable").innerHTML = output;

}
catch(error){
console.log(error);
alert("Failed to load bookings");
}

}
// ================= DELETE BOOKING =================
window.deleteBooking = async function(id){

if(confirm("Are you sure you want to delete this booking?")){

try{

await deleteDoc(doc(db,"bookings",id));

alert("Booking deleted successfully");

loadBookings();

}
catch(error){

console.log(error);

alert("Delete failed");

}

}

}

async function loadLogins(){

try{

const q = query(
collection(db,"users"),
orderBy("loginTime","desc")
);

const snapshot = await getDocs(q);

let output = "";
let sno = 1;

snapshot.forEach((docItem)=>{

const data = docItem.data();

output += `
<tr>
<td>${sno}</td>
<td>${data.username || ""}</td>
<td>${data.phone || ""}</td>
<td>
${
data.loginTime?.toDate
? data.loginTime.toDate().toLocaleString()
: ""
}
</td>

<td>
<button
class="btn btn-danger btn-sm"
onclick="deleteUser('${docItem.id}')">
Delete
</button>
</td>

</tr>
`;

sno++;

});

document.getElementById("loginTable").innerHTML = output;

}
catch(error){
console.log(error);
alert("Failed to load login data");
}

}
