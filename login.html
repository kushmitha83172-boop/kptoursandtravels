<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>AK Tours Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <style>

    body{
      margin:0;
      padding:0;
      font-family:Arial,sans-serif;
      background:#0f172a;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .popup-box{

      width:400px;
      background:#1e293b;
      padding:30px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
      color:white;

    }

    .popup-box h2{

      text-align:center;
      color:#00ffff;
      margin-bottom:25px;

    }

    .form-control{

      margin-bottom:15px;
      border-radius:10px;
      padding:12px;

    }

    .btn-login{

      width:100%;
      border:none;
      padding:12px;
      border-radius:10px;
      font-size:18px;
      font-weight:bold;
      background:linear-gradient(90deg,#06b6d4,#3b82f6);
      color:white;

    }

    .btn-login:hover{

      opacity:0.9;

    }

  </style>

</head>

<body>

  <div class="popup-box">

    <h2>
      Welcome To AK Tours
    </h2>

    <input
      type="text"
      id="username"
      class="form-control"
      placeholder="Enter Username">

    <input
      type="email"
      id="gmail"
      class="form-control"
      placeholder="Enter Gmail ID">

    <input
      type="text"
      id="phone"
      class="form-control"
      placeholder="Enter Phone Number">

    <button
      class="btn-login"
      onclick="loginUser()">

      Continue

    </button>

  </div>

<script src="./login.js"></script>

</body>

</html>
